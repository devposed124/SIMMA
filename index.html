<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIMMA HOTEL</title>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = originalFetch;
          var propDesc = {
            get: function() {
              return customFetch;
            },
            set: function(val) {
              customFetch = val;
            },
            configurable: true,
            enumerable: true
          };
          try {
            Object.defineProperty(window, 'fetch', propDesc);
          } catch (e) {
            console.warn('Could not define fetch getter/setter on window:', e);
          }
          if (typeof globalThis !== 'undefined') {
            try {
              Object.defineProperty(globalThis, 'fetch', propDesc);
            } catch (e) {
              console.warn('Could not define fetch getter/setter on globalThis:', e);
            }
          }
        } catch (err) {
          console.error('Fetch proxy setup failed:', err);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
